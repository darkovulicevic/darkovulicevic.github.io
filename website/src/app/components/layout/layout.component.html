<div *ngIf="isLoading" class="this_loading">
    <div class="this_loading_spinner"></div>
</div>

<div class="this_layout">
    <div class="this_background">
        <div class="this_orb this_orb_one"></div>
        <div class="this_orb this_orb_two"></div>
        <div class="this_orb this_orb_three"></div>
    </div>

    <div class="this_progress" [style.transform]="progressTransform()"></div>

    <div class="this_left">
        <div class="this_left_inner">
            <app-me class="this_left_top"></app-me>
            <app-copy class="this_left_bottom"></app-copy>
        </div>
    </div>

    <app-info class="this_right"></app-info>
</div>
